<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo" style="margin-bottom: 2rem; padding-left: 1rem;">AdminPanel</div>
            <ul class="sidebar-menu">
                <li><a href="#" class="active"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a href="#"><i class="fas fa-users-cog"></i> Manage Users</a></li>
                <li><a href="#"><i class="fas fa-check-circle"></i> Verify Jobs</a></li>
                <li><a href="#"><i class="fas fa-chart-pie"></i> Analytics</a></li>
                <li><a href="#"><i class="fas fa-cog"></i> Settings</a></li>
            </ul>
            <ul class="sidebar-menu" style="flex: 0;">
                <li><button class="theme-toggle" id="themeToggleBtn" style="padding-left:1rem;"><i class="fas fa-moon"></i> Theme</button></li>
                <li><a href="login.html"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main">
            <header class="dashboard-header">
                <h2>Platform Overview</h2>
            </header>

            <div class="stat-grid">
                <div class="glass-panel stat-card">
                    <h3>1,204</h3>
                    <p>Total Users</p>
                </div>
                <div class="glass-panel stat-card">
                    <h3>356</h3>
                    <p>Jobs Posted</p>
                </div>
                <div class="glass-panel stat-card">
                    <h3>89</h3>
                    <p>Pending Approvals</p>
                </div>
            </div>

            <div class="glass-panel">
                <h3>System Reports</h3>
                <p style="margin-top: 1rem; color: #888;">Generate detailed reports on skill trends and platform growth.</p>
            </div>
        </main>
    </div>
    <script src="js/main.js"></script>
</body>
</html>
