<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Company Dashboard • SmartJobFinder</title>
  <link rel="icon" href="img/favicon.png">
  <!-- Google Fonts & FontAwesome -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="css/style.css" rel="stylesheet" />
</head>
<body class="min-h-screen bg-gradient-to-tr from-indigo-950 via-slate-900 to-indigo-900 text-slate-100 font-inter">

  <!-- Navbar -->
  <nav class="sticky top-0 z-50 bg-slate-900/80 backdrop-blur-md border-b border-white/10 px-6 py-4 flex justify-between items-center shadow-lg">
    <div class="flex items-center space-x-2">
      <span id="navCompanyName" class="text-2xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-pink-500">SmartJobFinder</span>
      <span class="text-xs bg-indigo-500/20 text-indigo-300 font-bold px-2.5 py-0.5 rounded-full border border-indigo-500/30">Employer Portal</span>
    </div>
    <div class="flex items-center space-x-6">
      <a href="company-profile.html" class="text-slate-300 hover:text-white transition flex items-center gap-2">
        <i class="fas fa-building text-indigo-400"></i> Profile
      </a>
      <button onclick="handleLogout()" class="text-rose-400 hover:text-rose-300 transition flex items-center gap-2 font-semibold bg-rose-500/10 hover:bg-rose-500/20 px-3.5 py-1.5 rounded-lg border border-rose-500/20">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </div>
  </nav>

  <main class="container mx-auto max-w-6xl p-6 md:p-8 space-y-8">
    
    <!-- Header Summary -->
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-white/5 border border-white/10 rounded-2xl p-6 shadow-xl backdrop-blur-sm">
      <div>
        <h2 class="text-3xl font-extrabold tracking-tight text-white mb-1">Recruiter Dashboard</h2>
        <p class="text-slate-350">Manage your active listings and candidate applications.</p>
      </div>
      <button id="newJobBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-xl shadow-lg transition transform hover:-translate-y-0.5 flex items-center gap-2">
        <i class="fas fa-plus"></i> Post New Job
      </button>
    </div>

    <!-- Stats -->
    <section class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="bg-gradient-to-br from-slate-900/60 to-indigo-950/40 border border-white/10 rounded-2xl p-6 shadow-md flex items-center justify-between">
        <div>
          <p class="text-slate-400 text-sm font-semibold uppercase tracking-wider mb-1">Active Vacancies</p>
          <h2 class="text-4xl font-extrabold text-white" id="totalJobs">0</h2>
        </div>
        <div class="p-4 bg-indigo-500/10 border border-indigo-500/20 rounded-xl">
          <i class="fas fa-briefcase text-2xl text-indigo-400"></i>
        </div>
      </div>
      
      <div class="bg-gradient-to-br from-slate-900/60 to-indigo-950/40 border border-white/10 rounded-2xl p-6 shadow-md flex items-center justify-between">
        <div>
          <p class="text-slate-400 text-sm font-semibold uppercase tracking-wider mb-1">Total Applications</p>
          <h2 class="text-4xl font-extrabold text-white" id="totalApps">0</h2>
        </div>
        <div class="p-4 bg-emerald-500/10 border border-emerald-500/20 rounded-xl">
          <i class="fas fa-users text-2xl text-emerald-400"></i>
        </div>
      </div>
    </section>

    <!-- Job List -->
    <section class="space-y-4">
      <div class="flex items-center justify-between">
        <h2 class="text-2xl font-bold text-white flex items-center gap-2">
          <i class="fas fa-list-ul text-indigo-400"></i> Your Job Posts
        </h2>
      </div>
      
      <div id="jobsContainer" class="space-y-4">
        <!-- Loader -->
        <div class="text-center py-12">
          <i class="fas fa-spinner fa-spin text-3xl text-indigo-400"></i>
          <p class="text-slate-400 mt-2">Fetching job listings...</p>
        </div>
      </div>
    </section>
  </main>

  <script>
    const token = localStorage.getItem('token');
    if (!token) { window.location.href = 'company-login.html'; }
    
    try {
      const userStr = localStorage.getItem('user');
      if (userStr) {
        const user = JSON.parse(userStr);
        const compName = user.name || user.companyName;
        if (compName) {
          document.getElementById('navCompanyName').textContent = compName;
        }
      }
    } catch (e) { console.error('Error parsing user data', e); }

    function handleLogout() {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = 'company-login.html';
    }

    async function loadStatsAndJobs() {
      try {
        const res = await fetch('http://localhost:5000/api/company/me', {
          headers: { Authorization: `Bearer ${token}` }
        });
        if (!res.ok) throw new Error('Auth failed');
        
        // Jobs fetch
        const jobRes = await fetch('http://localhost:5000/api/company/jobs', {
          headers: { Authorization: `Bearer ${token}` }
        });
        const { data: jobs } = await jobRes.json();
        document.getElementById('totalJobs').textContent = jobs.length;
        
        // Count applications
        const totalApps = jobs.reduce((sum, j) => sum + (j.applicationsCount || 0), 0);
        document.getElementById('totalApps').textContent = totalApps;
        
        const container = document.getElementById('jobsContainer');
        container.innerHTML = '';
        
        if (jobs.length === 0) {
          container.innerHTML = `
            <div class="bg-white/5 border border-white/10 rounded-2xl p-12 text-center">
              <i class="fas fa-folder-open text-4xl text-slate-500 mb-3"></i>
              <p class="text-slate-300 font-medium">No job postings found.</p>
              <p class="text-sm text-slate-500 mt-1">Get started by creating your first listing!</p>
            </div>`;
          return;
        }

        jobs.forEach(job => {
          const el = document.createElement('div');
          el.className = 'bg-white/5 hover:bg-white/10 border border-white/10 hover:border-indigo-500/30 rounded-2xl p-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 transition shadow-md';
          el.innerHTML = `
            <div>
              <h3 class="text-xl font-bold text-white mb-1">${job.title}</h3>
              <p class="text-sm text-slate-400 flex items-center gap-4">
                <span><i class="fas fa-map-marker-alt text-indigo-400 mr-1"></i>${job.location}</span>
                <span><i class="fas fa-clock text-indigo-400 mr-1"></i>${job.jobType}</span>
                <span onclick="window.location.href='applicants.html?jobId=${job._id}'" class="cursor-pointer bg-indigo-500/20 hover:bg-indigo-500/40 text-indigo-200 px-3 py-1 rounded-full border border-indigo-500/30 transition shadow-sm ml-2" style="pointer-events: auto;">
                  <i class="fas fa-users text-indigo-300 mr-1"></i> View Applicants
                </span>
              </p>
            </div>
            <div class="flex items-center gap-3 w-full md:w-auto">
              <button data-id="${job._id}" class="editBtn flex-1 md:flex-none bg-amber-500/10 hover:bg-amber-500/20 text-amber-300 border border-amber-500/30 hover:border-amber-500/60 font-semibold py-2 px-4 rounded-lg transition text-sm flex items-center justify-center gap-1.5">
                <i class="fas fa-edit"></i> Edit
              </button>
              <button data-id="${job._id}" class="delBtn flex-1 md:flex-none bg-rose-500/10 hover:bg-rose-500/20 text-rose-300 border border-rose-500/30 hover:border-rose-500/60 font-semibold py-2 px-4 rounded-lg transition text-sm flex items-center justify-center gap-1.5">
                <i class="fas fa-trash-alt"></i> Delete
              </button>
            </div>`;
          container.appendChild(el);
        });

        // Attach delete handler
        document.querySelectorAll('.delBtn').forEach(btn => {
          btn.addEventListener('click', async (e) => {
            const id = e.currentTarget.dataset.id;
            if (!confirm('Are you sure you want to delete this job post?')) return;
            try {
              await fetch(`http://localhost:5000/api/company/jobs/${id}`, {
                method: 'DELETE',
                headers: { Authorization: `Bearer ${token}` }
              });
              loadStatsAndJobs();
            } catch (err) {
              console.error(err);
            }
          });
        });
      } catch (err) { 
        console.error(err);
        localStorage.removeItem('token');
        window.location.href = 'company-login.html';
      }
    }

    document.getElementById('newJobBtn').addEventListener('click', () => {
      window.location.href = 'company-post-job.html';
    });
    
    loadStatsAndJobs();
  </script>
</body>
</html>
